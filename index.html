<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen Chat</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="landing-page">
  <header class="landing-nav">
    <a class="brand-mark" href="index.html" aria-label="Lumen Chat home">
      <span class="brand-icon">L</span>
      <span>Lumen Chat</span>
    </a>
    <nav class="landing-links" aria-label="Primary navigation">
      <a href="dist/index.html">Sign in</a>
      <a class="btn" href="dist/index.html">Start chatting</a>
    </nav>
  </header>

  <main class="landing-hero">
    <section class="hero-copy" aria-labelledby="hero-title">
      <p class="eyebrow">Clean private conversations</p>
      <h1 id="hero-title">Lumen Chat</h1>
      <p class="hero-text">
        A focused chat workspace where new accounts start blank, conversations begin from search, and shared files are easy to read by type.
      </p>
      <div class="hero-actions">
        <a class="btn" href="dist/index.html">Create account</a>
        <a class="btn btn-outline" href="dist/index.html">Login with Google</a>
      </div>
    </section>

    <section class="hero-product" aria-label="Lumen Chat preview">
      <div class="preview-shell">
        <div class="preview-sidebar">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="preview-chat">
          <div class="preview-search">Search people to start a chat</div>
          <div class="preview-thread">
            <div class="preview-bubble left"></div>
            <div class="preview-bubble right"></div>
            <div class="preview-file pdf">PDF</div>
            <div class="preview-file img">IMG</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
