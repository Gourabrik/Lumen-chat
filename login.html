<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lumen Chat</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel" aria-labelledby="auth-title">
      <a class="brand-mark" href="index.html" aria-label="Lumen Chat home">
        <span class="brand-icon">L</span>
        <span>Lumen Chat</span>
      </a>

      <div class="auth-heading">
        <p class="eyebrow">Welcome</p>
        <h1 id="auth-title">Sign in or create account</h1>
        <p>New accounts open with no messages. Search for a person when you are ready to start chatting.</p>
      </div>

      <button class="google-button" id="google-login" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or use email</span></div>

      <form class="auth-form" id="auth-form">
        <label>
          <span>Name</span>
          <input class="input-field" id="auth-name" type="text" placeholder="Your name" autocomplete="name">
        </label>
        <label>
          <span>Email</span>
          <input class="input-field" id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" required>
        </label>
        <label>
          <span>Password</span>
          <input class="input-field" id="auth-password" type="password" placeholder="Minimum 6 characters" autocomplete="current-password" required minlength="6">
        </label>
        <button class="btn btn-submit" type="submit">Continue</button>
      </form>
    </section>
  </main>

  <script>
    const USERS_KEY = 'lumenChatUsers';
    const SESSION_KEY = 'lumenChatSession';

    const getUsers = () => JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
    const saveUsers = (users) => localStorage.setItem(USERS_KEY, JSON.stringify(users));

    const initials = (nameOrEmail) => nameOrEmail
      .split(/[ @._-]+/)
      .filter(Boolean)
      .slice(0, 2)
      .map((part) => part[0].toUpperCase())
      .join('') || 'LC';

    const signIn = ({ email, name, provider }) => {
      const normalizedEmail = email.trim().toLowerCase();
      const users = getUsers();
      const existingUser = users[normalizedEmail];

      if (!existingUser) {
        users[normalizedEmail] = {
          email: normalizedEmail,
          name: name.trim() || normalizedEmail.split('@')[0],
          initials: initials(name || normalizedEmail),
          provider,
          conversations: {},
          createdAt: new Date().toISOString()
        };
        saveUsers(users);
      }

      localStorage.setItem(SESSION_KEY, normalizedEmail);
      window.location.href = 'app.html';
    };

    document.getElementById('auth-form').addEventListener('submit', (event) => {
      event.preventDefault();
      signIn({
        email: document.getElementById('auth-email').value,
        name: document.getElementById('auth-name').value,
        provider: 'email'
      });
    });

    document.getElementById('google-login').addEventListener('click', () => {
      signIn({
        email: 'google.user@lumen.local',
        name: 'Google User',
        provider: 'google'
      });
    });
  </script>
</body>
</html>
