<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Purple App</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Login Page Specific Styles */
    body {
      background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="topo" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M50 0c0 20-20 30-20 50s20 30 20 50m0-100c10 20 50 30 50 50s-40 30-50 50" fill="none" stroke="%23e4deff" stroke-width="1" opacity="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(%23topo)"/></svg>');
      background-color: var(--bg-color);
    }

    .login-container {
      background-color: var(--surface-color-light);
      padding: 3rem 2.5rem;
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 4px solid var(--secondary-color);
    }

    .logo-container {
      margin-bottom: 2rem;
    }

    .logo-container svg {
      width: 50px;
      height: 50px;
      fill: none;
      stroke: var(--primary-color);
      stroke-width: 2;
    }

    .logo-container h1 {
      font-size: 1.5rem;
      color: var(--primary-color);
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .forgot-link:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
    }

    .divider {
      margin: 2rem 0;
      border-top: 1px solid var(--border-color);
      position: relative;
    }

    .divider span {
      position: absolute;
      top: -0.7rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-color-light);
      padding: 0 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .divider .sso-title {
      display: block;
      margin-top: -1.2rem;
      background: var(--surface-color-light);
      padding: 0 0.5rem;
      color: var(--text-main);
      font-weight: 500;
      margin-bottom: 0.2rem;
    }

    .sso-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn-sso {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      background-color: var(--surface-color-light);
      border-radius: 8px;
      color: var(--text-main);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-sso:hover {
      background-color: var(--surface-color-accent);
      border-color: #d1ccdf;
    }

    .sso-icon {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-container">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 8h8v8H8z"></path>
        <path d="M12 8v8"></path>
      </svg>
      <h1>PURPLE APP</h1>
    </div>

    <form action="index.html" method="GET">
      <div class="form-group">
        <input type="email" class="input-field" placeholder="Email" required>
      </div>
      <div class="form-group">
        <input type="password" class="input-field" placeholder="Password" required>
      </div>
      
      <a href="#" class="forgot-link">Forgot Password?</a>
      
      <button type="submit" class="btn btn-submit">Sign In</button>
    </form>

    <div class="divider">
      <span class="sso-title">Single Sign-On</span>
      <br>
      <span>Or continue with:</span>
    </div>

    <div class="sso-buttons">
      <button class="btn-sso">
        <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="btn-sso">
        <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zm12.6 0H12.6V0H24v11.4z" fill="#00a4ef"/>
          <path d="M11.4 11.4H0V0h11.4v11.4z" fill="#f25022"/>
          <path d="M24 11.4H12.6V0H24v11.4z" fill="#7fba00"/>
          <path d="M11.4 24H0V12.6h11.4V24z" fill="#00a4ef"/>
          <path d="M24 24H12.6V12.6H24V24z" fill="#ffb900"/>
        </svg>
        Microsoft
      </button>
    </div>
  </div>

</body>
</html>
